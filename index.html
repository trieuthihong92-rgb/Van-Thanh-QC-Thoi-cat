<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QC Vạn Thành — Thổi · Trộn · Cắt</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#0f172a; --bg2:#1e293b; --card:#1e293b; --card2:#273449;
  --accent:#14b8a6; --accent2:#0d9488; --text:#e2e8f0; --muted:#94a3b8;
  --border:#334155; --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);}
.app{display:flex;min-height:100vh;}
.sidebar{width:230px;background:var(--bg2);border-right:1px solid var(--border);padding:16px 10px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.brand{font-size:15px;font-weight:700;color:var(--accent);padding:6px 10px 16px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.brand small{display:block;color:var(--muted);font-weight:400;font-size:11px;margin-top:3px;}
.navitem{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13.5px;margin-bottom:3px;transition:.15s;}
.navitem:hover{background:var(--card2);color:var(--text);}
.navitem.active{background:var(--accent);color:#fff;font-weight:600;}
.navitem .cnt{margin-left:auto;background:rgba(255,255,255,.15);padding:1px 7px;border-radius:10px;font-size:11px;}
.main{flex:1;padding:18px 22px;max-width:100%;overflow-x:hidden;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
h1{font-size:19px;margin:0;}
.btn{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;}
.btn:hover{background:var(--accent2);}
.btn.ghost{background:var(--card2);border:1px solid var(--border);color:var(--text);}
.btn.danger{background:var(--bad);}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.kpi .v{font-size:20px;font-weight:700;color:var(--accent);}
.kpi .l{font-size:11.5px;color:var(--muted);margin-top:2px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;}
.card h3{margin:0 0 10px;font-size:14px;color:var(--text);}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.filters input,.filters select{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:7px 9px;border-radius:6px;font-size:12.5px;}
.tablewrap{overflow:auto;max-height:65vh;border:1px solid var(--border);border-radius:8px;}
table{border-collapse:collapse;width:100%;font-size:12px;white-space:nowrap;}
th{background:var(--card2);position:sticky;top:0;text-align:left;padding:7px 9px;color:var(--accent);border-bottom:1px solid var(--border);z-index:1;}
td{padding:6px 9px;border-bottom:1px solid #2a3850;color:var(--text);}
tr:hover td{background:#22304a;}
.formgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:10px;}
.formgrid label{font-size:10.5px;color:var(--muted);display:block;margin-bottom:3px;}
.formgrid input{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;font-size:12px;}
.empty{padding:30px;text-align:center;color:var(--muted);}
.rowdel{color:var(--bad);cursor:pointer;font-weight:700;}
.badge{font-size:10px;background:var(--card2);padding:2px 7px;border-radius:10px;color:var(--muted);}
.editor-meta{font-size:10.5px;color:var(--muted);}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:#475569;border-radius:4px;}
@media(max-width:850px){.app{flex-direction:column;} .sidebar{width:100%;height:auto;position:relative;display:flex;overflow-x:auto;}
.charts{grid-template-columns:1fr;}}

.connectScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;text-align:center;padding:20px;}
.connectScreen h2{margin:0;font-size:22px;}
.connectScreen p{color:var(--muted);margin:0 0 10px;max-width:420px;}
.connectScreen input{width:280px;max-width:80vw;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;text-align:center;}
.statusbar{position:fixed;top:10px;right:14px;font-size:11px;background:var(--card2);border:1px solid var(--border);padding:5px 10px;border-radius:20px;color:var(--muted);display:flex;align-items:center;gap:6px;z-index:50;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ok);}
.dot.bad{background:var(--bad);}
</style>
</head>
<body>

<div id="connectScreen" class="connectScreen">
  <div style="font-size:40px;">🏭</div>
  <h2>QC Vạn Thành — Thổi · Trộn · Cắt</h2>
  <p>Hệ thống dùng chung — dữ liệu lưu Firebase realtime, nhiều người nhập cùng lúc</p>
  <input id="userName" placeholder="Tên của bạn (VD: Hồng QC)">
  <button class="btn" onclick="connectFirebase()">🔌 Kết nối Firebase</button>
  <div id="connectStatus" class="editor-meta"></div>
</div>

<div class="app" id="appRoot" style="display:none;">
  <div class="sidebar" id="sidebar">
    <div class="brand">🏭 QC Vạn Thành<small>Thổi · Trộn · Cắt</small></div>
    <div id="navlist"></div>
  </div>
  <div class="main">
    <div class="topbar">
      <h1 id="pageTitle">Tổng quan</h1>
      <div style="display:flex;gap:8px;">
        <button class="btn ghost" onclick="exportCSV()">⬇ CSV</button>
        <button class="btn ghost" onclick="toggleForm()">➕ Nhập liệu</button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>
<div class="statusbar" id="statusbar" style="display:none;"><span class="dot" id="statusDot"></span><span id="statusText">Đang kết nối...</span></div>

const NUMERIC_HINTS = ['kg','số','phế','%','tổng','sl','tlt','dày','cuộn','chiếc','thùng','total','đm'];

let db = null;

let cache = {}; // key -> {headers, rows}  (rows = array of {id, vals})
let listenersAttached = false;

function setStatus(ok, text){
  document.getElementById('statusbar').style.display='flex';
  document.getElementById('statusDot').className = 'dot' + (ok?'':' bad');
  document.getElementById('statusText').textContent = text;
}

function connectFirebase(){
  const name = document.getElementById('userName').value.trim();
  if(!name){ alert('Vui lòng nhập tên của bạn'); return; }
  userName = name;
  localStorage.setItem('vt_qc_username', name);
  document.getElementById('connectStatus').textContent = 'Đang kết nối Firebase...';
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    db.ref('.info/connected').on('value', snap=>{
      setStatus(!!snap.val(), snap.val() ? 'Đã kết nối' : 'Mất kết nối');
    });
    seedIfEmptyThenListen();
    document.getElementById('connectScreen').style.display='none';
    document.getElementById('appRoot').style.display='flex';
  }catch(e){
    document.getElementById('connectStatus').textContent = '❌ Lỗi kết nối: ' + e.message;
  }
}

function seedIfEmptyThenListen(){
  TABS.forEach(t=>{
    const ref = db.ref('sheets/'+t.key);
    ref.once('value').then(snap=>{
      if(!snap.exists()){
        // seed from RAW excel data
        const src = RAW[t.name] || {headers:[],rows:[]};
        const seedObj = {};
        src.rows.forEach((r,i)=>{
          seedObj['r'+i] = {vals:r, by:'Import Excel', ts: Date.now()};
        });
        ref.child('headers').set(src.headers);
        ref.child('rows').set(seedObj);
      }
      attachListener(t);
    });
  });
}

function attachListener(t){
  const ref = db.ref('sheets/'+t.key);
  ref.on('value', snap=>{
    const val = snap.val() || {};
    const headers = val.headers || (RAW[t.name]?.headers) || [];
    const rowsObj = val.rows || {};
    const rows = Object.keys(rowsObj).map(k=>({id:k, vals: rowsObj[k].vals || [], by: rowsObj[k].by||'', ts: rowsObj[k].ts||0}));
    rows.sort((a,b)=> (a.ts||0)-(b.ts||0));
    cache[t.key] = {headers, rows};
    if(current===t.key || current==='dash') render();
  });
}

function isNumericCol(h){
  const low = h.toLowerCase();
  return NUMERIC_HINTS.some(x=>low.includes(x));
}
function fmtNum(v){
  if(typeof v !== 'number') return v;
  return v.toLocaleString('vi-VN', {maximumFractionDigits:2});
}

let current = 'dash';
let formOpen = false;

function renderNav(){
  const nav = document.getElementById('navlist');
  nav.innerHTML = '<div class="navitem '+(current==='dash'?'active':'')+'" onclick="goto(\'dash\')">📊 Tổng quan</div>';
  TABS.forEach(t=>{
    const obj = cache[t.key] || {rows:[]};
    nav.innerHTML += `<div class="navitem ${current===t.key?'active':''}" onclick="goto('${t.key}')">${t.icon} <span>${t.label.replace(t.icon,'').trim()}</span><span class="cnt">${obj.rows.length}</span></div>`;
  });
}
function goto(key){ current = key; formOpen=false; render(); }
function toggleForm(){ formOpen = !formOpen; render(); }

function render(){
  renderNav();
  const content = document.getElementById('content');
  document.getElementById('pageTitle').textContent = current==='dash' ? 'Tổng quan sản xuất' : TABS.find(t=>t.key===current).label;
  if(current==='dash'){ content.innerHTML = renderDashboard(); setTimeout(drawDashCharts,0); return; }
  const t = TABS.find(x=>x.key===current);
  const obj = cache[t.key] || {headers: RAW[t.name]?.headers||[], rows:[]};
  let html = '';
  html += renderKPIs(obj);
  if(formOpen) html += renderForm(t, obj);
  html += renderFilters();
  html += renderTable(t, obj);
  content.innerHTML = html;
}

function renderKPIs(obj){
  const numCols = obj.headers.map((h,i)=>({h,i})).filter(o=>isNumericCol(o.h));
  let totalsHtml = '';
  numCols.slice(0,3).forEach(c=>{
    let sum=0; obj.rows.forEach(r=>{ const v=r.vals[c.i]; if(typeof v==='number') sum+=v; });
    totalsHtml += `<div class="kpi"><div class="v">${fmtNum(sum)}</div><div class="l">${c.h}</div></div>`;
  });
  return `<div class="kpis">
    <div class="kpi"><div class="v">${obj.rows.length}</div><div class="l">Tổng số dòng</div></div>
    ${totalsHtml}
  </div>`;
}

function renderFilters(){
  return `<div class="filters">
    <input type="text" id="searchBox" placeholder="🔍 Tìm kiếm trong bảng..." oninput="render2()">
  </div>`;
}
function render2(){
  const t = TABS.find(x=>x.key===current);
  const obj = cache[t.key] || {headers:[],rows:[]};
  document.querySelector('.tablewrap')?.parentElement?.remove();
  const search = document.getElementById('searchBox').value;
  document.getElementById('content').insertAdjacentHTML('beforeend', renderTable(t,obj,search));
}

function renderTable(t, obj, search){
  if(!obj.rows.length) return '<div class="empty">📭 Chưa có dữ liệu — bấm "Nhập liệu" để thêm dòng mới.</div>';
  let rows = obj.rows;
  if(search){
    const s = search.toLowerCase();
    rows = rows.filter(o=>o.vals.some(v=>String(v??'').toLowerCase().includes(s)));
  }
  let thead = '<tr><th>#</th>' + obj.headers.map(h=>`<th>${h}</th>`).join('') + '<th>Người nhập</th><th></th></tr>';
  let tbody = rows.map((o,i)=>{
    const tds = o.vals.map(v=>`<td>${v===null||v===undefined||v===''?'':(typeof v==='number'?fmtNum(v):v)}</td>`).join('');
    return `<tr><td>${i+1}</td>${tds}<td><span class="badge">${o.by||''}</span></td><td><span class="rowdel" onclick="delRow('${current}','${o.id}')">✕</span></td></tr>`;
  }).join('');
  return `<div class="card" style="padding:0;"><div class="tablewrap"><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></div></div>`;
}

function delRow(key, id){
  if(!confirm('Xóa dòng này?')) return;
  db.ref('sheets/'+key+'/rows/'+id).remove();
}

function renderForm(t, obj){
  let fields = obj.headers.map((h,i)=>`<div><label>${h}</label><input id="f_${i}" placeholder="${h}"></div>`).join('');
  return `<div class="card">
    <h3>➕ Thêm dòng mới — ${t.label}</h3>
    <div class="formgrid">${fields}</div>
    <button class="btn" onclick="addRow('${t.key}')">💾 Lưu dòng</button>
    <button class="btn ghost" onclick="toggleForm()">Đóng</button>
  </div>`;
}
function addRow(key){
  const t = TABS.find(x=>x.key===key);
  const obj = cache[t.key] || {headers: RAW[t.name]?.headers||[], rows:[]};
  const row = obj.headers.map((h,i)=>{
    const el = document.getElementById('f_'+i);
    let v = el.value.trim();
    if(v==='') return null;
    const num = Number(v.replace(',', '.'));
    return (!isNaN(num) && v.match(/^[0-9.,-]+$/)) ? num : v;
  });
  const newRef = db.ref('sheets/'+key+'/rows').push();
  newRef.set({vals: row, by: userName, ts: Date.now()});
  formOpen = false;
}

  obj.rows.forEach(r=>{
    csv += r.vals.map(v=>{
      if(v===null||v===undefined) return '';
      const s = String(v).replace(/"/g,'""');
      return s.includes(',')?`"${s}"`:s;
    }).join(',') + ',' + (r.by||'') + '\n';
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${t.name}.csv`;
  a.click();
}

// ---------- Dashboard ----------
function sumCol(obj, hintArr){
  if(!obj) return 0;
  const idx = obj.headers.findIndex(h=>hintArr.some(x=>h.toLowerCase().includes(x)));
  if(idx<0) return 0;
  let s=0; obj.rows.forEach(r=>{ if(typeof r.vals[idx]==='number') s+=r.vals[idx]; });
  return s;
}
function renderDashboard(){
  const all = TABS.map(t=>({t,obj:cache[t.key]||{headers:[],rows:[]}}));
  const totalRows = all.reduce((a,x)=>a+x.obj.rows.length,0);
  const catKg = sumCol(all.find(x=>x.t.key==='cat').obj, ['tổng kg đạt']);
  const thoiPeKg = sumCol(all.find(x=>x.t.key==='thoipe').obj, ['số lượng']);
  const tronPeKg = sumCol(all.find(x=>x.t.key==='tronpe').obj, ['total']);
  let cards = `<div class="kpis">
    <div class="kpi"><div class="v">${totalRows}</div><div class="l">Tổng số bản ghi (7 sổ)</div></div>
    <div class="kpi"><div class="v">${fmtNum(catKg)}</div><div class="l">Tổng kg đạt — Cắt</div></div>
    <div class="kpi"><div class="v">${fmtNum(thoiPeKg)}</div><div class="l">Tổng kg — Thổi túi PE</div></div>
    <div class="kpi"><div class="v">${fmtNum(tronPeKg)}</div><div class="l">Tổng kg — Trộn NL PE</div></div>
  </div>
  <div class="charts">
    <div class="card"><h3>📊 Số dòng dữ liệu theo sổ</h3><canvas id="chBars" height="200"></canvas></div>
    <div class="card"><h3>🥧 Tỷ trọng dữ liệu theo công đoạn</h3><canvas id="chPie" height="200"></canvas></div>
  </div>
  <div class="card"><h3>📁 Danh sách sổ dữ liệu</h3>
    <div class="tablewrap"><table><thead><tr><th>Sổ dữ liệu</th><th>Số cột</th><th>Số dòng</th><th></th></tr></thead><tbody>
    ${all.map(x=>`<tr><td>${x.t.icon} ${x.t.label.replace(x.t.icon,'').trim()}</td><td>${x.obj.headers.length}</td><td>${x.obj.rows.length}</td><td><span class="badge" style="cursor:pointer" onclick="goto('${x.t.key}')">Mở →</span></td></tr>`).join('')}
    </tbody></table></div>
  </div>`;
  return cards;
}
let dashCharts = [];
function drawDashCharts(){
  dashCharts.forEach(c=>c.destroy());
  dashCharts = [];
  const all = TABS.map(t=>({t,obj:cache[t.key]||{rows:[]}}));
  const labels = all.map(x=>x.t.label.replace(x.t.icon,'').trim());
  const counts = all.map(x=>x.obj.rows.length);
  const colors = ['#14b8a6','#f59e0b','#6366f1','#22c55e','#ef4444','#06b6d4','#a855f7'];
  const chBarsEl = document.getElementById('chBars');
  const chPieEl = document.getElementById('chPie');
  if(!chBarsEl || !chPieEl) return;
  const c1 = new Chart(chBarsEl, {
    type:'bar',
    data:{labels, datasets:[{label:'Số dòng', data:counts, backgroundColor:colors}]},
    options:{plugins:{legend:{display:false}}, scales:{x:{ticks:{color:'#94a3b8',font:{size:10}}},y:{ticks:{color:'#94a3b8'}}}}
  });
  const c2 = new Chart(chPieEl, {
    type:'doughnut',
    data:{labels, datasets:[{data:counts, backgroundColor:colors}]},
    options:{plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:10}}}}}
  });
  dashCharts.push(c1,c2);
}

// auto-fill saved name
window.addEventListener('DOMContentLoaded', ()=>{
  const saved = localStorage.getItem('vt_qc_username');
  if(saved) document.getElementById('userName').value = saved;
});
</script>
